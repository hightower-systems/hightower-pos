services:
  pos:
    build: .
    image: hightower-pos:latest
    container_name: hightower-pos
    ports:
      - "8080:8080"
    volumes:
      - pos-data:/data
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  pos-data:
